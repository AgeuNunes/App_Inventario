<!DOCTYPE html>
<html lang="pt-br">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventário</title>
  <link rel="shortcut icon" href="./icon.png" type="image/png">

  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">

  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

</head>

<body>

  <img src="logo.png" alt="logo">

  <h2>📦 Inventário</h2>

  <div class="container">

    <div class="containerLabel">
      <label>Item:</label>
    </div>

    <input type="text" id="inputQR" placeholder="Escaneie o QR Code" autofocus>

    <div class="containerLabel">
      <label>Quantidade:</label>
    </div>

    <input type="number" id="inputQtd" placeholder="Digite a quantidade">

    <div class="containerButton">
      <button class="btn" onclick="registrar()">Registrar ✅</button>
    </div>

    <table>

      <thead>
        <tr>
          <th>Código</th>
          <th>Descrição</th>
          <th>Quantidade</th>
          <th>Excluir</th>
        </tr>
      </thead>

      <tbody id="tabela"></tbody>

    </table>

    <div class="containerButton">
      <button class="btn" onclick="exportarExcel()">Salvar 📥</button>
    </div>

  </div>

  <script src="app.js"></script>

</body>

</html>
